<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convert PDF files to high-quality PNG or JPEG images instantly. Free, offline, and private.">
  <title>PDF to Photo — Convert PDF to Images</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <main class="container">
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="36" height="36" rx="8" stroke="currentColor" stroke-width="2.5"/>
          <path d="M12 10h10a4 4 0 014 4v0a4 4 0 01-4 4H12V10z" fill="currentColor" opacity="0.3"/>
          <path d="M12 18h8a4 4 0 014 4v0a4 4 0 01-4 4H12V18z" fill="currentColor" opacity="0.5"/>
          <line x1="12" y1="28" x2="12" y2="32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="30" cy="28" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
          <path d="M28 30l-2 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div>
          <h1>PDF to Photo</h1>
          <p class="tagline">Convert PDFs to images in seconds</p>
        </div>
      </div>
    </header>

    <div class="card" id="mainCard">
      <!-- Step 1: File Selection -->
      <div class="step active" id="step1">
        <div class="step-badge">1</div>
        <h2>Select PDF File</h2>
        <div class="drop-zone" id="dropZone">
          <svg class="drop-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="16" y="8" width="32" height="44" rx="4" stroke="currentColor" stroke-width="2.5"/>
            <path d="M24 16h16M24 22h16M24 28h10" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
            <circle cx="44" cy="44" r="14" fill="var(--primary)" opacity="0.15"/>
            <path d="M44 38v12M38 44h12" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <p class="drop-text">Drag & drop your PDF here</p>
          <p class="drop-subtext">or click to browse files</p>
          <input type="file" id="fileInput" accept=".pdf,application/pdf" hidden>
        </div>
        <div class="file-info" id="fileInfo">
          <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
            <path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/>
          </svg>
          <span id="fileName"></span>
          <button class="btn-remove" id="removeFile" title="Remove file">✕</button>
        </div>
      </div>

      <!-- Step 2: Format Selection -->
      <div class="step" id="step2">
        <div class="step-badge">2</div>
        <h2>Choose Format</h2>
        <div class="format-toggle">
          <button class="format-btn active" data-format="png" id="btnPng">
            <span class="format-icon">🖼️</span>
            <span class="format-label">PNG</span>
            <span class="format-desc">Lossless quality</span>
          </button>
          <button class="format-btn" data-format="jpeg" id="btnJpeg">
            <span class="format-icon">📸</span>
            <span class="format-label">JPEG</span>
            <span class="format-desc">Smaller file size</span>
          </button>
        </div>
      </div>

      <!-- Step 3: Convert -->
      <div class="step" id="step3">
        <div class="step-badge">3</div>
        <h2>Convert & Download</h2>
        <button class="btn-primary" id="convertBtn" disabled>
          <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 0l-3 3a1 1 0 001.414 1.414L9 9.414V13a1 1 0 102 0V9.414l1.293 1.293a1 1 0 001.414-1.414z" clip-rule="evenodd" transform="rotate(180 10 10)"/>
          </svg>
          <span>Convert PDF</span>
        </button>
      </div>

      <!-- Progress Section -->
      <div class="progress-section" id="progressSection">
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="progress-text" id="progressText">Preparing conversion…</p>
        <div class="spinner" id="spinner"></div>
      </div>

      <!-- Result Section -->
      <div class="result-section" id="resultSection">
        <div class="result-icon">✅</div>
        <h3 id="resultTitle">Conversion Complete!</h3>
        <p class="result-detail" id="resultDetail"></p>
        <button class="btn-success" id="downloadBtn">
          <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
          <span>Download ZIP</span>
        </button>
        <button class="btn-outline" id="convertAnotherBtn">Convert Another PDF</button>
      </div>

      <!-- Error Section -->
      <div class="error-section" id="errorSection">
        <div class="error-icon">⚠️</div>
        <p class="error-text" id="errorText"></p>
        <button class="btn-outline" id="retryBtn">Try Again</button>
      </div>
    </div>

    <footer class="footer">
      <p>🔒 100% offline — your files never leave your computer</p>
    </footer>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
